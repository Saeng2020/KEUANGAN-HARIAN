<section class="space-y-6">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <h2 class="text-lg font-semibold text-slate-900">Laporan Cashflow</h2>
      <p class="mt-1 text-sm text-slate-500">Filter transaksi dan lihat ringkasan pemasukan, pengeluaran, serta selisih.</p>
    </div>
    <button data-action="report-export" class="rounded-xl border border-sky-200 bg-sky-50 px-4 py-2.5 text-sm font-semibold text-sky-700 hover:bg-sky-100">Export Visual</button>
  </div>

  <form id="report-filter-form" class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="grid gap-3 md:grid-cols-[1fr_1fr_auto] md:items-end">
      <label class="block">
        <span class="text-sm font-semibold text-slate-700">Tanggal mulai</span>
        <input id="report-start-date" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-50" type="date" />
      </label>
      <label class="block">
        <span class="text-sm font-semibold text-slate-700">Tanggal akhir</span>
        <input id="report-end-date" class="mt-2 w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-50" type="date" />
      </label>
      <div class="flex gap-2">
        <button type="submit" class="rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700">Filter</button>
        <button type="button" data-action="report-reset" class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50">Reset</button>
      </div>
    </div>
  </form>

  <div id="reports-summary" class="grid gap-4 md:grid-cols-3"></div>

  <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <div class="flex items-center justify-between gap-3">
      <div>
        <h2 class="text-lg font-semibold text-slate-900">Grafik Ringkas</h2>
        <p id="reports-range-label" class="mt-1 text-sm text-slate-500">Rentang laporan.</p>
      </div>
    </div>
    <div id="reports-chart" class="mt-6"></div>
  </section>

  <div id="reports-empty"></div>
  <div id="reports-table" class="hidden md:block"></div>
  <div id="reports-cards" class="space-y-3 md:hidden"></div>
</section>
