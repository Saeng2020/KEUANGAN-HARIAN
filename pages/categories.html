<section class="space-y-6">
  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
    <div>
      <h2 class="text-lg font-semibold text-slate-900">Kategori</h2>
      <p id="categories-count" class="mt-1 text-sm text-slate-500">Kelola kategori pemasukan dan pengeluaran.</p>
    </div>
    <button data-action="category-add" class="rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-emerald-700">Tambah Kategori</button>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <label class="block max-w-xs">
      <span class="sr-only">Filter kategori</span>
      <select id="categories-type-filter" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm text-slate-900 focus:border-emerald-500 focus:outline-none focus:ring-4 focus:ring-emerald-50">
        <option value="all">Semua tipe</option>
        <option value="income">Pemasukan</option>
        <option value="expense">Pengeluaran</option>
      </select>
    </label>
  </div>

  <div id="categories-empty"></div>
  <div id="categories-table" class="hidden md:block"></div>
  <div id="categories-cards" class="space-y-3 md:hidden"></div>
</section>
